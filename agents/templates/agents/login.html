<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Indicateurs Côte d'Ivoire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --vert-ci:    #009A44;
            --bleu-fonce: #1a3a5c;
        }
        body {
            background: linear-gradient(135deg, var(--bleu-fonce) 0%, #2c5282 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .bandeau-drapeau {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(to right,
                #F77F00 33.33%,
                #FFFFFF 33.33%, #FFFFFF 66.66%,
                #009A44 66.66%);
            z-index: 9999;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 420px;
            width: 100%;
        }
        .login-header {
            background-color: var(--bleu-fonce);
            padding: 2rem;
            text-align: center;
            border-bottom: 3px solid var(--vert-ci);
        }
        .login-header h4 {
            color: #fff;
            font-weight: 700;
            margin: 0;
        }
        .login-header p {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin: 0.3rem 0 0;
        }
        .login-body { padding: 2rem; }
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
        }
        .form-control {
            border-radius: 6px;
            border: 1px solid #ddd;
            padding: 0.6rem 0.9rem;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: var(--vert-ci);
            box-shadow: 0 0 0 3px rgba(0,154,68,0.15);
        }
        .btn-login {
            background-color: var(--vert-ci);
            border: none;
            color: #fff;
            width: 100%;
            padding: 0.7rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .btn-login:hover { background-color: #007a35; }
        .link-retour {
            color: var(--bleu-fonce);
            font-size: 0.85rem;
            text-decoration: none;
        }
        .link-retour:hover { color: var(--vert-ci); }
        .alert {
            border-radius: 6px;
            border: none;
            font-size: 0.9rem;
        }
        .alert-danger  { background-color: #fee2e2; color: #991b1b; }
        .alert-success { background-color: #d1fae5; color: #065f46; }
    </style>
</head>
<body>
<div class="bandeau-drapeau"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="login-card">
                <!-- En-tête -->
                <div class="login-header">
                    <i class="bi bi-bar-chart-line-fill text-white fs-2 mb-2 d-block"></i>
                    <h4>Indicateurs Côte d'Ivoire</h4>
                    <p>Espace agents — Saisie des données climatiques</p>
                </div>

                <!-- Corps -->
                <div class="login-body">

                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} mb-3">
                            <i class="bi bi-exclamation-triangle me-2"></i>{{ message }}
                        </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-envelope me-1"></i>Adresse email
                            </label>
                            <input type="email" name="email" class="form-control"
                                   placeholder="votre@email.ci" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-lock me-1"></i>Mot de passe
                            </label>
                            <input type="password" name="password" class="form-control"
                                   placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn-login">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{% url 'public:accueil' %}" class="link-retour">
                            <i class="bi bi-arrow-left me-1"></i>Retour au site public
                        </a>
                    </div>
                </div>
            </div>

            <p class="text-center text-white-50 mt-3" style="font-size:0.8rem;">
                République de Côte d'Ivoire — Données climatiques officielles
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
